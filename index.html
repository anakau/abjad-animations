<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animations</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Mode label ── */
    #mode-label {
      position: fixed;
      top: 18px;
      right: 64px;
      z-index: 20;
      height: 36px;
      display: flex;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Hamburger button ── */
    #menu-btn {
      position: fixed;
      top: 18px;
      right: 20px;
      z-index: 20;
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0;
    }

    #menu-btn span {
      display: block;
      width: 16px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 2px;
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform-origin: center;
    }

    /* Animate hamburger → × when open */
    #menu-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    #menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    #menu-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    #menu-btn:hover span {
      background: rgba(255, 255, 255, 0.85);
    }

    /* ── Nav panel ── */
    nav {
      position: fixed;
      top: 62px;
      right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;

      /* Hidden by default */
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    nav.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    /* ── Group header ── */
    .group-header {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.2);
      white-space: nowrap;
      user-select: none;
      padding-top: 8px;
      margin-top: 2px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      width: 100%;
      text-align: right;
    }

    .group-header:first-child {
      padding-top: 0;
      margin-top: 0;
      border-top: none;
    }

    /* ── Animation links ── */
    nav a {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      letter-spacing: 0.07em;
      color: rgba(255, 255, 255, 0.38);
      text-decoration: none;
      transition: color 0.2s ease;
      white-space: nowrap;
      user-select: none;
    }

    nav a:hover {
      color: rgba(255, 255, 255, 0.75);
    }

    nav a.active {
      color: rgba(255, 255, 255, 0.95);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <iframe id="frame" src=""></iframe>

  <div id="mode-label"></div>

  <button id="menu-btn" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="nav"></nav>

  <script>
    const animations = [
      // ── Floating Slashes ──────────────────────────────────────────────────
      { label: "Implode",               href: "ImplodeAnimation.html",             type: "scroll",   group: "Floating Slashes" },
      { label: "Slash",                 href: "SlashAnimation.html",               type: "scroll",   group: "Floating Slashes" },
      { label: "Constellation Lines",   href: "ConstellationLinesAnimation.html",  type: "scroll",   group: "Floating Slashes" },
      // ── Slash Grid Variations ─────────────────────────────────────────────
      { label: "Grid Slash",            href: "GridSlashAnimation.html",           type: "scroll",   group: "Slash Grid Variations" },
      { label: "Grid Slash Loop",       href: "GridSlashLoopAnimation.html",       type: "autoplay", group: "Slash Grid Variations" },
      { label: "Logo Slash",            href: "LogoSlashAnimation.html",           type: "scroll",   group: "Slash Grid Variations" },
      { label: "Logo Form Slash",       href: "LogoFormSlashAnimation.html",       type: "autoplay", group: "Slash Grid Variations" },
      { label: "Grid Slash Center",     href: "GridSlashCenterAnimation.html",     type: "autoplay", group: "Slash Grid Variations" },
      // ── Nodes Variations ──────────────────────────────────────────────────
      { label: "Constellation Slash",   href: "ConstellationSlashAnimation.html",  type: "scroll",   group: "Nodes Variations" },
      { label: "Constellation Tagline", href: "ConstellationTaglineAnimation.html",type: "autoplay", group: "Nodes Variations" },
      // Add new entries here ↓
    ];

    const frame     = document.getElementById('frame');
    const nav       = document.getElementById('nav');
    const menuBtn   = document.getElementById('menu-btn');
    const modeLabel = document.getElementById('mode-label');

    // Toggle menu open/closed
    menuBtn.addEventListener('click', () => {
      const open = nav.classList.toggle('open');
      menuBtn.classList.toggle('open', open);
    });

    function show(i) {
      frame.src = animations[i].href;
      location.hash = i + 1;
      nav.querySelectorAll('a').forEach((a, j) => a.classList.toggle('active', j === i));
      nav.classList.remove('open');
      menuBtn.classList.remove('open');
      modeLabel.textContent = animations[i].type === 'scroll'
        ? 'Scroll to experience'
        : 'Autoplay';
    }

    function hashIndex() {
      const n = parseInt(location.hash.slice(1));
      return (Number.isFinite(n) && n >= 1 && n <= animations.length) ? n - 1 : 0;
    }

    // Build nav with group headers
    let currentGroup = null;
    animations.forEach((anim, i) => {
      if (anim.group !== currentGroup) {
        currentGroup = anim.group;
        const header = document.createElement('div');
        header.className = 'group-header';
        header.textContent = anim.group;
        nav.appendChild(header);
      }
      const a = document.createElement('a');
      a.textContent = `Animation ${i + 1}`;
      a.href = `#${i + 1}`;
      a.addEventListener('click', e => { e.preventDefault(); show(i); });
      nav.appendChild(a);
    });

    show(hashIndex());
    window.addEventListener('hashchange', () => show(hashIndex()));
  </script>

</body>
</html>
